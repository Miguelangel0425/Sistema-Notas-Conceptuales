server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Los módulos ES (.js con type="module") necesitan MIME type text/javascript.
    types {
        text/javascript js mjs;
        text/css css;
        application/json json;
    }

    # Hash-routing (#/dashboard, #/notas, etc.): el navegador nunca envía el
    # fragmento al servidor, así que basta con servir siempre index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /dist/ {
        add_header Cache-Control "no-cache";
    }

    location /styles/ {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css text/javascript application/javascript;
}
